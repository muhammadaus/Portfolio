<!DOCTYPE html>
<html>
<head>
    <title>Modal Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test-btn { padding: 15px 30px; font-size: 16px; cursor: pointer; }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
        }
        .close-btn {
            padding: 10px 20px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Modal Test</h1>
    <button class="test-btn" onclick="openModal()">Click to Open Modal</button>

    <div class="modal" id="test-modal">
        <div class="modal-content">
            <h2>Modal Works!</h2>
            <p>If you can see this, the modal functionality is working.</p>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        console.log('Test page loaded');

        function openModal() {
            console.log('openModal called');
            const modal = document.getElementById('test-modal');
            console.log('Modal element:', modal);
            modal.style.display = 'flex';
            console.log('Modal display set to flex');
        }

        function closeModal() {
            console.log('closeModal called');
            const modal = document.getElementById('test-modal');
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
