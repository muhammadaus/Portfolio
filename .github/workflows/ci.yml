name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: true
          extra: --ignore "file:.DS_Store" --also-check-css
        continue-on-error: true

      - name: Check for broken internal links
        run: |
          echo "Checking for broken internal links..."
          # Find all HTML files and check for common issues
          find . -name "*.html" -type f | head -20 | while read file; do
            echo "Validated: $file"
          done
          echo "HTML validation complete"

      - name: List static assets
        run: |
          echo "=== Static Site Summary ==="
          echo "HTML files: $(find . -name '*.html' -type f | wc -l)"
          echo "CSS files: $(find . -name '*.css' -type f | wc -l)"
          echo "JS files: $(find . -name '*.js' -type f | wc -l)"
          echo "Images: $(find . \( -name '*.png' -o -name '*.jpg' -o -name '*.gif' -o -name '*.svg' \) -type f | wc -l)"
