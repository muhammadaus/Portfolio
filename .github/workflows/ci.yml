name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate:
    name: Validate Static Site
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check required files exist
      run: |
        echo "Checking required files..."
        test -f index.html && echo "✓ index.html exists"
        test -d css && echo "✓ css/ directory exists"
        test -d js && echo "✓ js/ directory exists"
        test -d img && echo "✓ img/ directory exists"
        echo "All required files present!"
    
    - name: Validate HTML syntax
      uses: Cyb3r-Jak3/html5validator-action@v7.2.0
      with:
        root: .
        css: false
        blacklist: "vendor node_modules"
      continue-on-error: true  # Don't fail on HTML warnings
    
    - name: Check for common issues
      run: |
        echo "Checking for common issues..."
        
        # Check for console.log statements in JS files
        if grep -r "console.log" js/*.js 2>/dev/null; then
          echo "⚠ Warning: console.log statements found in JS files"
        fi
        
        # Check that CSS files aren't empty
        for css_file in css/*.css; do
          if [ -f "$css_file" ] && [ ! -s "$css_file" ]; then
            echo "⚠ Warning: Empty CSS file: $css_file"
          fi
        done
        
        echo "Checks complete!"

  deploy-preview:
    name: Deploy Preview Info
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: List changed files
      run: |
        echo "## Changed Files in this PR" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        git diff --name-only origin/${{ github.base_ref }}...HEAD >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Unable to determine changed files" >> $GITHUB_STEP_SUMMARY
